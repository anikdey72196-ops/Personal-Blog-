{% extends 'base.html' %}

{% block title %}Delete Article{% endblock %}

{% block content %}
<h1>Delete Article?</h1>
<p style="font-size: 1.2rem; text-align: center;">Are you sure you want to delete "{{ blog.title }}"?</p>
<form method="POST" style="text-align: center;">
    {% csrf_token %}
    <a href="{% url 'dashboard' %}" class="btn" style="padding: 10px 20px;">Cancel</a>
    <button type="submit" class="btn-submit" style="background-color: #e74c3c;">Delete</button>
</form>
{% endblock %}
