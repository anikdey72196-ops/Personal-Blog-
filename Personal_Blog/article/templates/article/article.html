{% extends 'base.html' %}

{% block title %}{{ blog.title }}{% endblock %}

{% block content %}
<h1>{{ blog.title }}</h1>
<div style="color: #95a5a6; font-size: 1.1rem; font-weight: 700; margin-bottom: 20px;">
    {{ blog.date|date:"F j, Y" }}
</div>
<div style="font-size: 1.1rem; line-height: 1.6;">
    {{ blog.content|linebreaks }}
</div>
{% endblock %}
