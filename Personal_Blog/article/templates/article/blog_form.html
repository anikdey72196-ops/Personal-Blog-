{% extends 'base.html' %}

{% block title %}{% if blog %}Update Article{% else %}New Article{% endif %}{% endblock %}

{% block content %}
<h1>{% if blog %}Update Article{% else %}New Article{% endif %}</h1>
<form method="POST">
    {% csrf_token %}
    <div class="form-group">
        <input type="text" name="title" class="form-control" value="{{ blog.title|default_if_none:'' }}" placeholder="Article Title" required>
    </div>
    <div class="form-group">
        <input type="date" name="date" class="form-control" value="{{ blog.date|date:'Y-m-d'|default_if_none:'' }}" placeholder="Publishing Date">
    </div>
    <div class="form-group">
        <textarea name="content" class="form-control" placeholder="Content" required>{{ blog.content|default_if_none:'' }}</textarea>
    </div>
    <button type="submit" class="btn-submit">{% if blog %}Update Article{% else %}Save Article{% endif %}</button>
</form>
{% endblock %}
